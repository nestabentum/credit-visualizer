<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/credit.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Visualizer</title>
    <!-- Apply dark class synchronously before first paint to avoid FOUC.
         Reads from localStorage; falls back to OS preference. -->
    <script>
      (function () {
        var stored = localStorage.getItem('darkMode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored !== null ? stored === 'true' : prefersDark;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
